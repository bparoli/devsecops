apiVersion: apps/v1
kind: Deployment
metadata:
  name: diagnostic-agent
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: diagnostic-agent
  template:
    metadata:
      labels:
        app: diagnostic-agent
    spec:
      containers:
        - name: agent
          image: diagnostic-agent:latest
          imagePullPolicy: Never
          env:
            - name: LOKI_URL
              value: "http://loki.monitoring:3100"
            - name: TELEGRAM_TOKEN
              valueFrom:
                secretKeyRef:
                  name: agent-secrets
                  key: TELEGRAM_TOKEN
            - name: TELEGRAM_CHAT_ID
              valueFrom:
                secretKeyRef:
                  name: agent-secrets
                  key: TELEGRAM_CHAT_ID
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: agent-secrets
                  key: ANTHROPIC_API_KEY
            - name: JIRA_URL
              valueFrom:
                secretKeyRef:
                  name: agent-secrets
                  key: JIRA_URL
                  optional: true
            - name: JIRA_EMAIL
              valueFrom:
                secretKeyRef:
                  name: agent-secrets
                  key: JIRA_EMAIL
                  optional: true
            - name: JIRA_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: agent-secrets
                  key: JIRA_API_TOKEN
                  optional: true
            - name: JIRA_PROJECT_KEY
              valueFrom:
                secretKeyRef:
                  name: agent-secrets
                  key: JIRA_PROJECT_KEY
                  optional: true
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
