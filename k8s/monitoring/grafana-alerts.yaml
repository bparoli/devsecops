apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-alerts
  namespace: monitoring
data:
  arithmetic-api-alerts.yaml: |
    apiVersion: 1
    groups:
      - orgId: 1
        name: arithmetic-api
        folder: Arithmetic API
        interval: 30s
        rules:
          - uid: arithmetic-api-down
            title: Arithmetic API Down (pod restarting)
            condition: C
            data:
              - refId: A
                relativeTimeRange:
                  from: 60
                  to: 0
                datasourceUid: prometheus
                model:
                  expr: up{job="arithmetic-api"}
                  refId: A
              - refId: C
                datasourceUid: __expr__
                model:
                  type: threshold
                  refId: C
                  expression: A
                  conditions:
                    - evaluator:
                        type: lt
                        params: [1]
                      operator:
                        type: and
                      query:
                        params: [A]
                      reducer:
                        type: last
                        params: []
            noDataState: Alerting
            execErrState: Alerting
            for: 0s
            annotations:
              summary: "Arithmetic API pod caído o reiniciando"
              description: "Prometheus no puede scrapear el target arithmetic-api. El pod puede haber crasheado por división por cero."
            isPaused: false
