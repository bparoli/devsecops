apiVersion: apps/v1
kind: Deployment
metadata:
  name: remediation-agent
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: remediation-agent
  template:
    metadata:
      labels:
        app: remediation-agent
    spec:
      serviceAccountName: remediation-agent
      containers:
        - name: agent
          image: remediation-agent:latest
          imagePullPolicy: Never
          command: ["python", "remediation_main.py"]
          env:
            - name: TELEGRAM_TOKEN
              valueFrom:
                secretKeyRef:
                  name: agent-secrets
                  key: TELEGRAM_TOKEN
            - name: TELEGRAM_CHAT_ID
              valueFrom:
                secretKeyRef:
                  name: agent-secrets
                  key: TELEGRAM_CHAT_ID
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: agent-secrets
                  key: ANTHROPIC_API_KEY
            - name: JIRA_URL
              valueFrom:
                secretKeyRef:
                  name: agent-secrets
                  key: JIRA_URL
            - name: JIRA_EMAIL
              valueFrom:
                secretKeyRef:
                  name: agent-secrets
                  key: JIRA_EMAIL
            - name: JIRA_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: agent-secrets
                  key: JIRA_API_TOKEN
            - name: JIRA_PROJECT_KEY
              valueFrom:
                secretKeyRef:
                  name: agent-secrets
                  key: JIRA_PROJECT_KEY
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: agent-secrets
                  key: GITHUB_TOKEN
            - name: GITHUB_REPO
              valueFrom:
                secretKeyRef:
                  name: agent-secrets
                  key: GITHUB_REPO
            - name: TARGET_DEPLOYMENT
              value: "arithmetic-api"
            - name: TARGET_NAMESPACE
              value: "default"
            - name: TARGET_IMAGE
              value: "go-arithmetic-api:latest"
          volumeMounts:
            - name: docker-sock
              mountPath: /var/run/docker.sock
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
      volumes:
        - name: docker-sock
          hostPath:
            path: /var/run/docker.sock
            type: Socket
