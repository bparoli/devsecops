apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards-config
  namespace: monitoring
data:
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: default
        orgId: 1
        folder: ''
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards

  arithmetic-api.json: |
    {
      "title": "Arithmetic API",
      "uid": "arithmetic-api",
      "schemaVersion": 38,
      "version": 2,
      "refresh": "10s",
      "time": { "from": "now-1h", "to": "now" },
      "panels": [
        {
          "id": 1,
          "title": "Request Rate (req/s)",
          "type": "timeseries",
          "gridPos": { "x": 0, "y": 0, "w": 12, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "sum(rate(http_requests_total[1m])) by (path)",
              "legendFormat": "{{path}}"
            }
          ]
        },
        {
          "id": 2,
          "title": "Error Rate (5xx req/s)",
          "type": "timeseries",
          "gridPos": { "x": 12, "y": 0, "w": 12, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "sum(rate(http_requests_total{status_code=~\"5..\"}[1m])) by (path)",
              "legendFormat": "{{path}} errors"
            }
          ]
        },
        {
          "id": 3,
          "title": "Request Latency P50 / P95 (s)",
          "type": "timeseries",
          "gridPos": { "x": 0, "y": 8, "w": 12, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "histogram_quantile(0.50, sum(rate(http_request_duration_seconds_bucket[1m])) by (le, path))",
              "legendFormat": "P50 {{path}}"
            },
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket[1m])) by (le, path))",
              "legendFormat": "P95 {{path}}"
            }
          ]
        },
        {
          "id": 4,
          "title": "Application Logs",
          "type": "logs",
          "gridPos": { "x": 12, "y": 8, "w": 12, "h": 8 },
          "datasource": { "type": "loki", "uid": "loki" },
          "targets": [
            {
              "datasource": { "type": "loki", "uid": "loki" },
              "expr": "{job=\"kubernetes-pods\", filename=~\".*/default_arithmetic-api.*.log\"}",
              "legendFormat": ""
            }
          ]
        }
      ]
    }
