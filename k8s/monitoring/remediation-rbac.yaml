apiVersion: v1
kind: ServiceAccount
metadata:
  name: remediation-agent
  namespace: monitoring
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: remediation-agent
  namespace: default
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "patch"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: remediation-agent
  namespace: default
subjects:
  - kind: ServiceAccount
    name: remediation-agent
    namespace: monitoring
roleRef:
  kind: Role
  name: remediation-agent
  apiGroup: rbac.authorization.k8s.io
