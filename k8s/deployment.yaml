apiVersion: apps/v1
kind: Deployment
metadata:
  name: arithmetic-api
  labels:
    app: arithmetic-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: arithmetic-api
  template:
    metadata:
      labels:
        app: arithmetic-api
    spec:
      containers:
      - name: arithmetic-api
        image: go-arithmetic-api:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
          name: http
        env:
        - name: PORT
          value: "8080"
        resources:
          requests:
            cpu: 100m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 128Mi
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
